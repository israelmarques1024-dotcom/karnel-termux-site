<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f001a"/>
      <stop offset="40%" stop-color="#1a0533"/>
      <stop offset="70%" stop-color="#2d0a4a"/>
      <stop offset="100%" stop-color="#4a0e3a"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b6f"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4a0e78"/>
    </linearGradient>
    <linearGradient id="gem2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- sky -->
  <rect width="1200" height="600" fill="url(#sky)"/>
  <!-- stars -->
  <rect x="100" y="40" width="2" height="2" fill="white" opacity="0.8"/>
  <rect x="250" y="80" width="2" height="2" fill="white" opacity="0.6"/>
  <rect x="350" y="30" width="3" height="3" fill="white" opacity="0.7"/>
  <rect x="500" y="60" width="2" height="2" fill="white" opacity="0.5"/>
  <rect x="680" y="45" width="2" height="2" fill="white" opacity="0.8"/>
  <rect x="800" y="90" width="3" height="3" fill="white" opacity="0.6"/>
  <rect x="950" y="35" width="2" height="2" fill="white" opacity="0.7"/>
  <rect x="1050" y="75" width="2" height="2" fill="white" opacity="0.5"/>
  <rect x="150" y="120" width="2" height="2" fill="white" opacity="0.4"/>
  <rect x="720" y="110" width="2" height="2" fill="white" opacity="0.6"/>
  <rect x="430" y="100" width="2" height="2" fill="white" opacity="0.5"/>
  <rect x="880" y="50" width="2" height="2" fill="white" opacity="0.7"/>
  <!-- mountains (pixel art style) -->
  <rect x="0" y="300" width="1200" height="4" fill="#1a0533"/>
  <!-- mountain range 1 -->
  <rect x="0" y="420" width="1200" height="4" fill="#1a0540"/>
  <rect x="60" y="380" width="40" height="40" fill="#1a0540"/>
  <rect x="60" y="360" width="20" height="20" fill="#1a0540"/>
  <rect x="140" y="360" width="40" height="60" fill="#1a0540"/>
  <rect x="140" y="340" width="20" height="20" fill="#1a0540"/>
  <rect x="220" y="320" width="40" height="100" fill="#1a0540"/>
  <rect x="220" y="300" width="20" height="20" fill="#1a0540"/>
  <rect x="280" y="340" width="40" height="80" fill="#1a0540"/>
  <rect x="280" y="320" width="20" height="20" fill="#1a0540"/>
  <!-- mountain range 2 -->
  <rect x="400" y="360" width="40" height="60" fill="#2a0a4a"/>
  <rect x="400" y="340" width="20" height="20" fill="#2a0a4a"/>
  <rect x="480" y="380" width="40" height="40" fill="#2a0a4a"/>
  <rect x="540" y="340" width="40" height="80" fill="#2a0a4a"/>
  <rect x="540" y="320" width="20" height="20" fill="#2a0a4a"/>
  <rect x="620" y="360" width="40" height="60" fill="#2a0a4a"/>
  <rect x="620" y="340" width="20" height="20" fill="#2a0a4a"/>
  <!-- mountain range 3 -->
  <rect x="750" y="340" width="40" height="80" fill="#1a0540"/>
  <rect x="750" y="320" width="20" height="20" fill="#1a0540"/>
  <rect x="830" y="360" width="40" height="60" fill="#1a0540"/>
  <rect x="890" y="380" width="40" height="40" fill="#1a0540"/>
  <rect x="970" y="350" width="40" height="70" fill="#1a0540"/>
  <rect x="970" y="330" width="20" height="20" fill="#1a0540"/>
  <rect x="1050" y="370" width="40" height="50" fill="#1a0540"/>
  <rect x="1120" y="390" width="80" height="30" fill="#1a0540"/>
  <!-- ground -->
  <rect x="0" y="420" width="1200" height="4" fill="#2a0a4a"/>
  <rect x="0" y="424" width="1200" height="4" fill="#3a1060"/>
  <rect x="0" y="428" width="1200" height="172" fill="#1a0533"/>
  <!-- foreground pixel grid -->
  <rect x="0" y="440" width="20" height="20" fill="#2a0a4a" opacity="0.3"/>
  <rect x="40" y="460" width="20" height="20" fill="#2a0a4a" opacity="0.3"/>
  <rect x="80" y="450" width="20" height="20" fill="#2a0a4a" opacity="0.2"/>
  <rect x="140" y="470" width="20" height="20" fill="#2a0a4a" opacity="0.3"/>
  <rect x="1000" y="445" width="20" height="20" fill="#2a0a4a" opacity="0.3"/>
  <rect x="1060" y="465" width="20" height="20" fill="#2a0a4a" opacity="0.2"/>
  <rect x="1120" y="450" width="20" height="20" fill="#2a0a4a" opacity="0.3"/>
  <rect x="1160" y="480" width="20" height="20" fill="#2a0a4a" opacity="0.2"/>
  <!-- gem glow -->
  <ellipse cx="600" cy="280" rx="100" ry="120" fill="#a855f7" opacity="0.1" filter="url(#glow)"/>
  <ellipse cx="600" cy="280" rx="60" ry="80" fill="#ff3b6f" opacity="0.15" filter="url(#glow)"/>
  <!-- pixel art gem -->
  <rect x="584" y="200" width="32" height="12" rx="2" fill="url(#gem)" filter="url(#glow2)"/>
  <rect x="576" y="212" width="48" height="12" rx="2" fill="url(#gem)"/>
  <rect x="568" y="224" width="64" height="12" rx="2" fill="url(#gem)"/>
  <rect x="560" y="236" width="80" height="12" rx="2" fill="url(#gem)"/>
  <rect x="552" y="248" width="96" height="12" rx="2" fill="url(#gem)"/>
  <rect x="544" y="260" width="112" height="12" rx="2" fill="url(#gem2)"/>
  <rect x="548" y="272" width="104" height="12" rx="2" fill="url(#gem2)"/>
  <rect x="556" y="284" width="88" height="12" rx="2" fill="url(#gem2)"/>
  <rect x="564" y="296" width="72" height="12" rx="2" fill="url(#gem2)"/>
  <rect x="572" y="308" width="56" height="12" rx="2" fill="#ff3b6f"/>
  <rect x="580" y="320" width="40" height="12" rx="2" fill="#ff3b6f"/>
  <rect x="588" y="332" width="24" height="12" rx="2" fill="#ff6b9d"/>
  <!-- gem highlights -->
  <rect x="576" y="224" width="16" height="12" rx="2" fill="white" opacity="0.3"/>
  <rect x="568" y="236" width="12" height="12" rx="2" fill="white" opacity="0.2"/>
  <rect x="584" y="236" width="20" height="12" rx="2" fill="white" opacity="0.15"/>
  <rect x="600" y="248" width="24" height="12" rx="2" fill="white" opacity="0.12"/>
  <rect x="544" y="260" width="16" height="12" rx="2" fill="white" opacity="0.1"/>
  <!-- sparkles around gem -->
  <rect x="520" y="220" width="6" height="6" rx="1" fill="white" opacity="0.7" filter="url(#glow2)"/>
  <rect x="674" y="240" width="6" height="6" rx="1" fill="white" opacity="0.5" filter="url(#glow2)"/>
  <rect x="510" y="280" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
  <rect x="686" y="270" width="4" height="4" rx="1" fill="white" opacity="0.6" filter="url(#glow2)"/>
  <rect x="640" y="210" width="4" height="4" rx="1" fill="white" opacity="0.5"/>
  <rect x="556" y="200" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
</svg>
