<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b6f"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4a0e78"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- pixel art gem/crystal -->
  <rect x="28" y="4" width="8" height="4" rx="1" fill="#ff6b9d" opacity="0.8"/>
  <rect x="24" y="8" width="16" height="4" rx="1" fill="url(#lg)"/>
  <rect x="20" y="12" width="24" height="4" rx="1" fill="url(#lg)"/>
  <rect x="16" y="16" width="32" height="4" rx="1" fill="url(#lg)"/>
  <rect x="12" y="20" width="40" height="4" rx="1" fill="url(#lg)"/>
  <rect x="8" y="24" width="48" height="4" rx="1" fill="url(#lg2)"/>
  <rect x="10" y="28" width="44" height="4" rx="1" fill="url(#lg2)"/>
  <rect x="14" y="32" width="36" height="4" rx="1" fill="url(#lg2)"/>
  <rect x="18" y="36" width="28" height="4" rx="1" fill="url(#lg2)"/>
  <rect x="22" y="40" width="20" height="4" rx="1" fill="#ff3b6f"/>
  <rect x="26" y="44" width="12" height="4" rx="1" fill="#ff3b6f"/>
  <rect x="30" y="48" width="4" height="4" rx="1" fill="#ff6b9d"/>
  <!-- highlights -->
  <rect x="24" y="12" width="4" height="4" rx="1" fill="white" opacity="0.3"/>
  <rect x="20" y="16" width="4" height="4" rx="1" fill="white" opacity="0.2"/>
  <rect x="30" y="16" width="8" height="4" rx="1" fill="white" opacity="0.15"/>
  <rect x="36" y="20" width="4" height="4" rx="1" fill="white" opacity="0.1"/>
  <!-- sparkle -->
  <rect x="50" y="8" width="4" height="4" rx="1" fill="white" opacity="0.6" filter="url(#glow)"/>
  <rect x="52" y="4" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
  <rect x="6" y="36" width="4" height="4" rx="1" fill="white" opacity="0.3"/>
</svg>
